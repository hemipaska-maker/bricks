name: property_price
description: "Calculate property price: area, base price, tax, total, format"
inputs:
  width: "float"
  height: "float"
  price_per_sqm: "float"
  tax_rate: "float"
steps:
  - name: calculate_area
    brick: multiply
    params:
      a: "${inputs.width}"
      b: "${inputs.height}"
    save_as: area
  - name: round_area
    brick: round_value
    params:
      value: "${area.result}"
      decimals: 2
    save_as: rounded_area
  - name: calculate_base_price
    brick: multiply
    params:
      a: "${rounded_area.result}"
      b: "${inputs.price_per_sqm}"
    save_as: base_price
  - name: calculate_tax
    brick: multiply
    params:
      a: "${base_price.result}"
      b: "${inputs.tax_rate}"
    save_as: tax_amount
  - name: calculate_total
    brick: add
    params:
      a: "${base_price.result}"
      b: "${tax_amount.result}"
    save_as: total
  - name: format_display
    brick: format_result
    params:
      label: "Total (EUR)"
      value: "${total.result}"
    save_as: formatted
outputs_map:
  total: "${total.result}"
  display: "${formatted.display}"
