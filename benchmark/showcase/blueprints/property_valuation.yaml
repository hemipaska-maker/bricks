name: property_valuation
description: "Full property valuation: area, price, discount, tax, monthly payment"
inputs:
  width: "float"
  height: "float"
  price_per_sqm: "float"
  discount_rate: "float"
  tax_rate: "float"
  monthly_factor: "float"
steps:
  - name: calculate_area
    brick: multiply
    params:
      a: "${inputs.width}"
      b: "${inputs.height}"
    save_as: area
  - name: round_area
    brick: round_value
    params:
      value: "${area.result}"
      decimals: 2
    save_as: rounded_area
  - name: calculate_base_price
    brick: multiply
    params:
      a: "${rounded_area.result}"
      b: "${inputs.price_per_sqm}"
    save_as: base_price
  - name: calculate_discount
    brick: multiply
    params:
      a: "${base_price.result}"
      b: "${inputs.discount_rate}"
    save_as: discount_amount
  - name: calculate_net_price
    brick: subtract
    params:
      a: "${base_price.result}"
      b: "${discount_amount.result}"
    save_as: net_price
  - name: calculate_tax
    brick: multiply
    params:
      a: "${net_price.result}"
      b: "${inputs.tax_rate}"
    save_as: tax_amount
  - name: calculate_total
    brick: add
    params:
      a: "${net_price.result}"
      b: "${tax_amount.result}"
    save_as: total
  - name: round_total
    brick: round_value
    params:
      value: "${total.result}"
      decimals: 2
    save_as: rounded_total
  - name: calculate_monthly
    brick: multiply
    params:
      a: "${rounded_total.result}"
      b: "${inputs.monthly_factor}"
    save_as: monthly_payment
  - name: round_monthly
    brick: round_value
    params:
      value: "${monthly_payment.result}"
      decimals: 2
    save_as: rounded_monthly
  - name: format_total
    brick: format_result
    params:
      label: "Total"
      value: "${rounded_total.result}"
    save_as: total_formatted
  - name: format_monthly
    brick: format_result
    params:
      label: "Monthly"
      value: "${rounded_monthly.result}"
    save_as: monthly_formatted
outputs_map:
  total: "${rounded_total.result}"
  monthly: "${rounded_monthly.result}"
  total_display: "${total_formatted.display}"
  monthly_display: "${monthly_formatted.display}"
