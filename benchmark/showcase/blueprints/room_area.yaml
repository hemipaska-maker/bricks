name: room_area
description: "Calculate room area, round it, and format a display string"
inputs:
  width: "float"
  height: "float"
steps:
  - name: calculate_area
    brick: multiply
    params:
      a: "${inputs.width}"
      b: "${inputs.height}"
    save_as: area
  - name: round_area
    brick: round_value
    params:
      value: "${area.result}"
      decimals: 2
    save_as: rounded
  - name: format_display
    brick: format_result
    params:
      label: "Area (m2)"
      value: "${rounded.result}"
    save_as: formatted
outputs_map:
  area: "${rounded.result}"
  display: "${formatted.display}"
