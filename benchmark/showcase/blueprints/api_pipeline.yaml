name: api_data_pipeline
description: "Fetch user data from API, extract a specific field, format output"
inputs:
  api_url: "str"
  user_index: "int"
  field: "str"
steps:
  - name: fetch_data
    brick: http_get
    params:
      url: "${inputs.api_url}"
    save_as: response
  - name: extract_users
    brick: json_extract
    params:
      data: "${response.body}"
      path: "users"
    save_as: users_list
  - name: extract_field
    brick: json_extract
    params:
      data: "${users_list.value}"
      path: "${inputs.user_index}.${inputs.field}"
    save_as: extracted
  - name: format_output
    brick: format_result
    params:
      label: "Extracted value"
      value: "${extracted.value}"
    save_as: formatted
outputs_map:
  value: "${extracted.value}"
  display: "${formatted.display}"
