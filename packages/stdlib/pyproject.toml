[project]
name = "bricks-stdlib"
version = "0.4.23"
description = "Standard library of reusable bricks for the Bricks execution engine."
requires-python = ">=3.10"
license = "MIT"
authors = [
    { name = "Hemi", email = "hemi@example.com" },
]
keywords = ["bricks", "stdlib", "automation", "workflow"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3",
    "Typing :: Typed",
]

dependencies = [
    "bricks>=0.4.23",
]

[project.entry-points."bricks.packs"]
stdlib = "bricks_stdlib"

[project.urls]
Homepage = "https://gitlab.com/hemi/bricks"
Repository = "https://gitlab.com/hemi/bricks"

[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]
