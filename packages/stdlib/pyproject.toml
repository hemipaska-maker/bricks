[project]
name = "bricks-ai-stdlib"
version = "0.4.23"
description = "Standard library of reusable bricks for the Bricks execution engine."
requires-python = ">=3.10"
license = "MIT"
authors = [
    { name = "Hemi", email = "hemipaska@gmail.com" },
]
keywords = ["bricks", "ai", "stdlib", "automation", "workflow", "reusable"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Libraries :: Application Frameworks",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Typing :: Typed",
]
readme = {file = "README.md", content-type = "text/markdown"}

dependencies = [
    "bricks-ai>=0.4.23",
]

[project.entry-points."bricks.packs"]
stdlib = "bricks_stdlib"

[project.urls]
Homepage = "https://github.com/hemipaska-maker/bricks"
Repository = "https://github.com/hemipaska-maker/bricks"
Issues = "https://github.com/hemipaska-maker/bricks/issues"
Documentation = "https://github.com/hemipaska-maker/bricks#readme"

[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]
